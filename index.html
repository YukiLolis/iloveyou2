<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bé iu ơi 🥺</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#ffe6f2;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ====== TRÁI TIM ====== */
#hearts{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
}

.heart{
    position:absolute;
    color:rgba(255,105,180,.35);
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{
        transform:translateY(0) scale(.5);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh) scale(1.6);
        opacity:0;
    }
}

/* ====== SAO ====== */
.nightStar{

    position:absolute;

    border-radius:50%;

    background:white;

    opacity:.2;

    animation:
    twinkleNight infinite alternate;

    box-shadow:
        0 0 5px white,
        0 0 10px white,
        0 0 20px white;
}

@keyframes twinkleNight{

    0%{
        opacity:.1;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.3;
    }
}
#stars{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    border-radius:50%;
    background:white;

    box-shadow:
    0 0 5px white,
    0 0 10px white,
    0 0 15px white;

    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:.2;
        transform:scale(.7);
    }

    to{
        opacity:1;
        transform:scale(1.5);
    }
}

/* ====== KHUNG CHÍNH ====== */

.container{
    text-align:center;
    position:relative;
    z-index:2;
}

.cat{
    width:260px;
    margin-bottom:15px;
}

.caption{
    color:#ff2d55;
    font-size:28px;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:35px;
    text-shadow:0 0 8px rgba(255,255,255,.5);
}

.buttons{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    min-height:220px;
}

button{
    border:none;
    border-radius:12px;
    color:white;
    cursor:pointer;
    transition:all .4s ease;
    font-weight:bold;
}

#yesBtn{
    background:#2ecc71;
    padding:15px 30px;
    font-size:20px;
    z-index:2;
}

#noBtn{
    background:#e74c3c;
    padding:15px 30px;
    font-size:20px;
    position:relative;
    z-index:3;
    transition:
        transform .8s cubic-bezier(.2,1.3,.3,1),
        all .4s ease;
}
/* ====== BẬT/TẮT NHẠC ====== */

.musicHint{
    margin-bottom:20px;
    color:#777;
    font-size:14px;
    user-select:none;
}

#musicIcon{
    position:fixed;
    top:20px;
    right:20px;
    font-size:35px;
    z-index:99999;

    opacity:.4;

    transition:.3s;

    pointer-events:none;
}

#musicIcon.playing{
    opacity:1;
    animation:spin 4s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
#loveScene{
    position:fixed;
    inset:0;
    background:#000;
    z-index:999999;
    display:none;
    overflow:hidden;
}

/* ===== SAO ===== */



@keyframes starBlink{
    from{
        opacity:.3;
    }
    to{
        opacity:1;
    }
}

/* ===== TUYẾT ===== */

.snowflake{
    position:absolute;
    color:white;
    opacity:.8;
    user-select:none;

    animation:snowFall linear forwards;
}

@keyframes snowFall{
    from{
        transform:translateY(-10vh);
    }

    to{
        transform:translateY(110vh);
    }
}

/* ===== CHỮ ===== */

#messageBox{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:50px;
}

#messageText{

    font-family:
    'Dancing Script',
    cursive;

    color:white;

    text-align:center;

    max-width:1000px;

    line-height:1.7;

    opacity:0;

    transform:scale(.8);

    text-shadow:
        0 0 10px rgba(255,255,255,.8),
        0 0 20px rgba(255,192,203,.7),
        0 0 35px rgba(255,105,180,.5);

    transition:
        opacity 2s ease,
        transform 2s ease;
}

/* ===== TRÁI TIM ===== */

#heartContainer{
    position:absolute;
    inset:0;
}

#pinkboard{
    width:100%;
    height:100%;
}

#loveTitle{

    opacity:0;

    position:absolute;

    top:55%;
    left:50%;

    transform:translate(-50%,-50%);

    color:#ff9ed0;

    font-size:90px;

    line-height:1.1;

    font-family:'Great Vibes',cursive;

    text-align:center;

    z-index:9999;

    text-shadow:
        0 0 10px #ff9ed0,
        0 0 30px #ff9ed0,
        0 0 60px #ff9ed0,
        0 0 100px #ff9ed0;
}

#loveTitle span{
    display:block;
    margin-top:15px;

    font-family:'Great Vibes', cursive;
    font-size:85px;
    font-weight:normal;
}

.heartEmoji{
    margin-top:10px;
    font-size:55px;
}
</style>
</head>

<body>

<div id="hearts"></div>
<div id="stars"></div>

<div class="container">

    <!-- THAY ẢNH CỦA BẠN TẠI ĐÂY -->
    <img
        src="cat.png"
        class="cat"
        alt="cat">

    <div class="caption">
        Người đẹp kia ơi có còn dỗi anh khonggg ❤️<br>
        Em khongg chọn hoặc thoát là đồng ý hết dỗi anh nhóoo
    </div>

    <div class="buttons">

        <button id="yesBtn">
            Tạm tha cho anh ròi
        </button>

        <button id="noBtn">
            Có cái đb
        </button>

    </div>
    <div id="musicIcon">🎵</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

</div>
<div id="loveScene">

    <div id="snow"></div>

    <div id="messageBox">
        <div id="messageText"></div>
    </div>

    <div id="heartContainer" style="display:none;">

        <canvas id="pinkboard"></canvas>

        <div id="loveTitle">
            From 618 Days<br>
            <span> with Love </span>
            <div class="heartEmoji">❤️</div>
        </div> 

    </div>

</div>
<script>

/* ===========================
   TẠO SAO
=========================== */

const starsContainer =
document.getElementById("stars");

for(let i=0;i<80;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "vw";

    star.style.top =
    Math.random()*100 + "vh";

    star.style.animationDelay =
    Math.random()*2 + "s";

    star.style.animationDuration =
    (1 + Math.random()*3) + "s";

    starsContainer.appendChild(star);
}

/* ===========================
   TẠO TRÁI TIM
=========================== */

const heartsContainer =
document.getElementById("hearts");

function createHeart(){

    const heart =
    document.createElement("div");

    heart.className = "heart";

    heart.innerHTML = "❤";

    heart.style.left =
    Math.random()*100 + "vw";

    heart.style.bottom = "-40px";

    heart.style.fontSize =
    (15 + Math.random()*25) + "px";

    heart.style.animationDuration =
    (5 + Math.random()*5) + "s";

    heartsContainer.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(createHeart,300);

/* ===========================
   NÚT BẤM
=========================== */

const yesBtn =
document.getElementById("yesBtn");

const noBtn =
document.getElementById("noBtn");

const texts = [
    "Đi mò hết dỗi anh đi mò",
    "Pls pls pls 🥺",
    "Đi mà người đẹp ơi 🥺",
    "Tha đuy hem có hối hận đou mò",
    "Tha đi hứa dẫn đuy mua truyện gay"
];

let clickCount = 0;

let yesScale = 1;
let noScale = 1;

noBtn.addEventListener("click",()=>{

    if(clickCount < texts.length){

        noBtn.innerText =
        texts[clickCount];

        yesScale += 1.15;
        noScale -= 0.12;

        yesBtn.style.transform =
        `scale(${yesScale})`;

        /* Vị trí từng lần bấm */
        const positions = [
            { x: 150, y: 50 },     // lần 1
            { x: 320, y: 100 },    // lần 2
            { x: -420, y: -320 },  // lần 3 (trên trái)
            { x: 420, y: -220 },   // lần 4 (trên phải)
            { x: 450, y: 280 }     // lần 5 (dưới phải)
        ];

        const pos = positions[clickCount];

        noBtn.style.transform =
        `translate(${pos.x}px, ${pos.y}px)
         scale(${Math.max(noScale,0.4)})`;

        clickCount++;
    }

    if(clickCount === 5){

        yesBtn.style.position = "fixed";
        yesBtn.style.top = "0";
        yesBtn.style.left = "0";

        yesBtn.style.width = "100vw";
        yesBtn.style.height = "100vh";

        yesBtn.style.borderRadius = "0";

        yesBtn.style.fontSize = "70px";

        yesBtn.style.transform = "none";

        yesBtn.style.zIndex = "9999";

        noBtn.style.display = "none";
    }
});

/* ===========================
   CHỨC NĂNG NÚT XANH
   (BẠN THÊM SAU)
=========================== */

yesBtn.addEventListener("click", async ()=>{

    document.querySelector(".container").style.display="none";

    document.getElementById("loveScene")
    .style.display="block";
    createNightStars();

    startSnow();

    const messages = [

        "Yayyy vợ đã bớt dỗi anh ròi",

        "Anh biết là anh đã làm cho vợ anh buồn nhiều lắm vợ cũng mất niềm tin vào anh lắm",

        "Nhưng mà anh thật sự yêu vợ anh nhiều lắm nì",

        "Anh sẽ cố gắng trong tương lai để ý và trân trọng vợ anh nhiều hơn nữa",

        "Sẽ cố gắng để vợ ít buồn những chuyện nhỏ nhặt mỗi ngày hơn",

        "Muốn cùng vợ đi đến cuối con đường này"

    ];

    const box =
    document.getElementById("messageText");

    for(let i=0;i<messages.length;i++){

        box.innerText = messages[i];

if(i===0){

    box.style.fontFamily =
    "'Great Vibes', cursive";

    box.style.fontSize =
    "110px";

    box.style.textShadow =
    `
    0 0 20px white,
    0 0 40px #ff69b4,
    0 0 70px #ff69b4
    `;
}
else{

    box.style.fontFamily =
    "'Dancing Script', cursive";

    box.style.fontSize =
    "52px";
}

        box.style.opacity="1";
        box.style.transform="scale(1)";

        await sleep(5000);

        box.style.opacity="0";
        box.style.transform="scale(1.15)";

        await sleep(2000);
    }

    document.getElementById("messageBox")
    .style.display="none";

    document.getElementById("heartContainer")
    .style.display="block";

    startHeartAnimation();
    const title =
document.getElementById("loveTitle");

setTimeout(()=>{

    title.style.transition =
    "opacity 3s ease";

    title.style.opacity = "1";

},500);
});
function sleep(ms){
    return new Promise(resolve=>{
        setTimeout(resolve,ms);
    });
}
function startSnow(){

    setInterval(()=>{

        const snow =
        document.createElement("div");

        snow.className = "snowflake";

        snow.innerHTML = "❄";

        snow.style.left =
        Math.random()*100 + "vw";

        snow.style.fontSize =
        (10 + Math.random()*20) + "px";

        snow.style.animationDuration =
        (5 + Math.random()*8) + "s";

        document
        .getElementById("snow")
        .appendChild(snow);

        setTimeout(()=>{
            snow.remove();
        },13000);

    },150);
}
/* ===========================
   NHẠC NỀN
=========================== */

const bgMusic =
document.getElementById("bgMusic");

const musicIcon =
document.getElementById("musicIcon");

let musicPlaying = false;

function toggleMusic(e){

    if(
        e.target.id === "yesBtn" ||
        e.target.id === "noBtn"
    ){
        return;
    }

    if(!musicPlaying){

        bgMusic.play()
        .then(()=>{

            musicPlaying = true;

            musicIcon.classList.add("playing");

        })
        .catch(err=>{

            console.log(err);

        });

    }else{

        bgMusic.pause();

        musicPlaying = false;

        musicIcon.classList.remove("playing");
    }
}

/* PC */
document.body.addEventListener(
    "click",
    toggleMusic
);

/* Android + iPhone */
document.body.addEventListener(
    "touchstart",
    toggleMusic
);
function startHeartAnimation(){

    const canvas =
    document.getElementById("pinkboard");

    const context =
    canvas.getContext("2d");

    function resize(){

        canvas.width =
        window.innerWidth;

        canvas.height =
        window.innerHeight;
    }

    resize();

    window.addEventListener(
        "resize",
        resize
    );

    function heart(t){

        return {

            x:
            16*Math.pow(Math.sin(t),3),

            y:
            -(13*Math.cos(t)
            -5*Math.cos(2*t)
            -2*Math.cos(3*t)
            -Math.cos(4*t))

        };
    }

    let particles = [];

    function createParticle(){
        const scale =
        18 + Math.random()*10;

        let t =
        Math.random() *
        Math.PI * 2;

        let p = heart(t);

        particles.push({

x:
canvas.width/2 +
p.x*scale,

y:
canvas.height/2 +
p.y*scale,

            vx:
            p.x*0.5,

            vy:
            p.y*0.5,

            life:1

        });
    }

    function animate(){

        requestAnimationFrame(
            animate
        );

        context.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        for(
            let i=0;
            i<8;
            i++
        ){
            createParticle();
        }
        for(let t=0;t<=Math.PI*2;t+=0.025){

    const x =
    canvas.width/2 +
    16*Math.pow(Math.sin(t),3)*22;

    const y =
    canvas.height/2 + 1 - 
    (
        13*Math.cos(t)
        -5*Math.cos(2*t)
        -2*Math.cos(3*t)
        -Math.cos(4*t)
    )*22;

    context.beginPath();

    const size =
    1.5 + Math.random()*2;

    const alpha =
    0.4 + Math.sin(Date.now()*0.004)*0.4;

    context.fillStyle =
    `rgba(255,170,220,${alpha})`;

    context.shadowBlur = 20;
    context.shadowColor = "#ff8fc8";

    context.arc(
        x,
        y,
        size,
        0,
        Math.PI*2
    );

    context.fill();
}

        particles.forEach(p=>{

            p.x += p.vx;

            p.y += p.vy;

            p.life -= 0.01;

            context.globalAlpha =
            p.life;

            const colors = [

    "#ff5ca4",
    "#ff89c7",
    "#ffd6eb",
    "#ffffff"

];

context.fillStyle =
colors[
Math.floor(
Math.random()*colors.length
)];

            context.beginPath();

            context.arc(
                p.x,
                p.y,
                3,
                0,
                Math.PI*2
            );

            context.fill();

        });

        particles =
        particles.filter(
            p=>p.life>0
        );
    }

    animate();
}
function createNightStars(){

    for(let i=0;i<180;i++){

        const star =
        document.createElement("div");

        star.className = "nightStar";

        star.style.left =
        Math.random()*100 + "vw";

        star.style.top =
        Math.random()*100 + "vh";

        const size =
        1 + Math.random()*4;

        star.style.width =
        size + "px";

        star.style.height =
        size + "px";

        star.style.animationDelay =
        Math.random()*5 + "s";

        star.style.animationDuration =
        (1 + Math.random()*4) + "s";

        document
        .getElementById("loveScene")
        .appendChild(star);
    }
}

</script>

</body>
</html>
